<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Writing Student Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="header">
        <div class="header-top">
            <a href="#" class="logo-link"><h1>Writing Dashboard</h1></a>
            <nav class="nav-links">
                <a href="#timeback" class="nav-link" data-page="timeback">Students</a>
                <a href="#timeback-metrics" class="nav-link" data-page="timeback-metrics">Metrics</a>
                <a href="#test-results" class="nav-link" data-page="test-results">Test Results</a>
            </nav>
        </div>
        <div class="header-meta" id="header-meta"></div>
    </header>

    <!-- Students Page -->
    <div class="page hidden" id="page-timeback">
        <div class="search-filters">
            <div class="search-row">
                <input type="text" id="search-timeback" class="search-input" placeholder="Search by name or email..." autocomplete="off" data-group="timeback">
            </div>
            <div class="dropdown-row">
                <div class="dropdown-group">
                    <label for="campus-timeback">Campus</label>
                    <select id="campus-timeback" class="dropdown" data-group="timeback"></select>
                </div>
                <div class="dropdown-group">
                    <label for="level-timeback">Level</label>
                    <select id="level-timeback" class="dropdown" data-group="timeback"></select>
                </div>
                <div class="dropdown-group">
                    <label for="status-timeback">Status</label>
                    <select id="status-timeback" class="dropdown" data-group="timeback">
                        <option value="all">All Students</option>
                        <option value="issues">Has Issues</option>
                        <option value="on-track">On Track</option>
                    </select>
                </div>
                <div class="results-count" id="results-count-timeback"></div>
                <button class="deep-dive-btn" id="deep-dive-btn">Deep Dives</button>
            </div>
        </div>
        <div class="deep-dive-panel hidden" id="deep-dive-panel"></div>
        <main class="main" id="main-timeback">
            <div class="loading" id="loading">Loading dashboard data...</div>
        </main>
    </div>

    <!-- Metrics Page -->
    <div class="page hidden" id="page-timeback-metrics">
        <div class="metrics-container" id="metrics-timeback"></div>
    </div>

    <!-- Test Results Page -->
    <div class="page hidden" id="page-test-results">
        <div class="test-results-container" id="test-results-container"></div>
    </div>

    <script src="app.js"></script>
</body>
</html>
