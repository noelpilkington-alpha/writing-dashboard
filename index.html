<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Writing Student Dashboard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="header">
        <div class="header-top">
            <a href="#" class="logo-link"><h1>Writing Dashboard</h1></a>
            <nav class="nav-links">
                <a href="#timeback" class="nav-link" data-page="timeback">Students</a>
                <a href="#timeback-metrics" class="nav-link" data-page="timeback-metrics">Metrics</a>
                <a href="#eg-analysis" class="nav-link" data-page="eg-analysis">EG Analysis</a>
                <a href="#test-results" class="nav-link" data-page="test-results">Test Results</a>
                <a href="#test-analysis" class="nav-link" data-page="test-analysis">Test Analysis</a>
                <a href="#testing-loops" class="nav-link" data-page="testing-loops">Testing Loops</a>
                <a href="#cohort-profile" class="nav-link" data-page="cohort-profile">Cohort Profile</a>
            </nav>
        </div>
        <div class="header-meta" id="header-meta"></div>
    </header>

    <!-- Students Page -->
    <div class="page hidden" id="page-timeback">
        <div class="search-filters">
            <div class="search-row">
                <input type="text" id="search-timeback" class="search-input" placeholder="Search by name or email..." autocomplete="off" data-group="timeback">
            </div>
            <div class="dropdown-row">
                <div class="dropdown-group">
                    <label for="campus-timeback">Campus</label>
                    <select id="campus-timeback" class="dropdown" data-group="timeback"></select>
                </div>
                <div class="dropdown-group">
                    <label for="level-timeback">Level</label>
                    <select id="level-timeback" class="dropdown" data-group="timeback"></select>
                </div>
                <div class="dropdown-group">
                    <label for="status-timeback">Status</label>
                    <select id="status-timeback" class="dropdown" data-group="timeback">
                        <option value="all">All Students</option>
                        <option value="issues">Has Issues</option>
                        <option value="on-track">On Track</option>
                    </select>
                </div>
                <div class="results-count" id="results-count-timeback"></div>
                <button class="deep-dive-btn" id="deep-dive-btn">Deep Dives</button>
            </div>
        </div>
        <div class="deep-dive-panel hidden" id="deep-dive-panel"></div>
        <main class="main" id="main-timeback">
            <div class="loading" id="loading">Loading dashboard data...</div>
        </main>
    </div>

    <!-- Metrics Page -->
    <div class="page hidden" id="page-timeback-metrics">
        <div class="metrics-container" id="metrics-timeback"></div>
    </div>

    <!-- EG Analysis Page -->
    <div class="page hidden" id="page-eg-analysis">
        <div class="metrics-container" id="eg-analysis-container"></div>
    </div>

    <!-- Test Results Page -->
    <div class="page hidden" id="page-test-results">
        <div class="test-results-container" id="test-results-container"></div>
    </div>

    <!-- Test Analysis Page -->
    <div class="page hidden" id="page-test-analysis">
        <div class="metrics-container" id="test-analysis-container"></div>
    </div>

    <!-- Testing Loops Page -->
    <div class="page hidden" id="page-testing-loops">
        <div class="metrics-container" id="testing-loops-container">
            <div class="loading">Loading testing loop data...</div>
        </div>
    </div>

    <!-- Cohort Profile Page -->
    <div class="page hidden" id="page-cohort-profile">
        <div class="metrics-container" id="cohort-profile-container"></div>
    </div>

    <script src="app.js"></script>
</body>
</html>
